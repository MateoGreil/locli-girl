name: Audit

on:
  push:
    branches: [main]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/audit.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
  schedule:
    # Weekly, Monday 06:00 UTC. Catches freshly-published advisories
    # even when Cargo.lock hasn't changed.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      # Absolute URLs so this works on Gitea/Forgejo Actions runners
      # whose action mirror (data.forgejo.org) only proxies the
      # `actions/*` org — not dtolnay/, taiki-e/, etc.
      - uses: https://github.com/actions/checkout@v4
      - uses: https://github.com/dtolnay/rust-toolchain@stable
      - uses: https://github.com/taiki-e/install-action@cargo-audit
      - run: cargo audit --deny warnings
