name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      # Absolute URLs so this works on Gitea/Forgejo Actions runners
      # whose action mirror only proxies the `actions/*` org.
      - uses: https://github.com/actions/checkout@v4

      - name: Install Rust stable
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system deps
        # cpal needs ALSA; souvlaki (MPRIS) needs D-Bus.
        # Use sudo only when we're not already root (act_runner
        # containers typically run as root and often ship without sudo).
        run: |
          if [ "$(id -u)" -ne 0 ]; then SUDO=sudo; fi
          $SUDO apt-get update
          $SUDO apt-get install -y --no-install-recommends \
            libasound2-dev libdbus-1-dev pkg-config

      - uses: https://github.com/Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --all-targets --locked
