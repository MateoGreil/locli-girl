name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libdbus-1-dev pkg-config

      - uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --locked --target "$TARGET"

      - name: Strip and package
        id: package
        # Dynamic values are bound to env first so they are never
        # interpolated directly into shell. TAG / TARGET are both
        # controlled by the workflow trigger / matrix, but following
        # the defence-in-depth pattern from:
        # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
        env:
          TARGET: ${{ matrix.target }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd "target/${TARGET}/release"
          strip locli-girl
          ARCHIVE="locli-girl-${TAG}-${TARGET}.tar.gz"
          tar czf "../../../${ARCHIVE}" locli-girl
          cd -
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          {
            echo "archive=${ARCHIVE}"
            echo "checksum=${ARCHIVE}.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          fail_on_unmatched_files: true
          generate_release_notes: true
